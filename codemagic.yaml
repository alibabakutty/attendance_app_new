workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    max_build_duration: 60

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanishkaa.attendanceapp

      vars:
        APP_STORE_APPLE_ID: 6776598247
        BUNDLE_ID: com.kanishkaa.attendanceapp

    integrations:
      app_store_connect: "Kanishkaa attendance app"

    scripts:
      - flutter packages pub get

      - name: Build IPA
        script: |
          flutter build ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - appletabperumal@icloud.com