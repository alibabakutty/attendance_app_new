workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable
      xcode: latest

      groups:
        - kanishka_env

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanishkaa.attendanceapp

      # App Store Connect API already configured in Codemagic UI
      integrations:
        app_store_connect: Kanishkaa attendance app

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release \
          --dart-define=API_BASE_URL=$API_BASE_URL

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - your-email@gmail.com