workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    max_build_duration: 60
    environment:
      ios_signing:
        provisioning_profiles:
          - Development Profiles3
        certificates:
          - Development Certificate2
      vars:
        APP_STORE_APPLE_ID: 6777390758
        BUNDLE_ID: com.kanishkaa.attendanceapp2026
        # Automatically generate unique build number based on timestamp
        PROJECT_BUILD_NUMBER: $(( $(date +%s) / 10 ))

    integrations:
      app_store_connect: 'Codemagic2'

    scripts:
      - script: xcode-project use-profiles

      - script: flutter packages pub get

      - name: Flutter build ipa with automatic build number
        script: |
          echo "Using build number: $PROJECT_BUILD_NUMBER"
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration   # Uses the 'Codemagic2' integration
        submit_to_testflight: true
      email:
        recipients:
          - appletabperumal@icloud.com