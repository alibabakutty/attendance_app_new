workflows:
  ios-release-workflow:
    name: Flutter iOS App Store Build
    # This line tells Codemagic to skip the root and step into your subfolder!
    working_directory: attendance_app_new
    environment:
      flutter: stable
      xcode: latest
    triggering:
      events:
        - push
      watched_branches:
        - main
    scripts:
      - name: Fetch Flutter Dependencies
        script: |
          flutter pub get
      - name: Build production IPA
        script: |
          flutter build ipa --release --dont-bundle-sentry-symbols
    artifacts:
      - build/ios/ipa/*.ipa