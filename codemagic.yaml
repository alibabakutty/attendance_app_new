workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Disable Swift Package Manager
        script: flutter config --no-enable-swift-package-manager
      - name: Get packages
        script: flutter pub get
      - name: Clean build cache
        script: flutter clean
      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa