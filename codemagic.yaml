workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Clean build cache
        script: flutter clean
      - name: Reset CocoaPods for SPM compatibility
        script: |
          cd ios
          pod deintegrate || true
          rm -f Podfile.lock
      - name: Build IPA
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa