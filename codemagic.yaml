workflows:
  ios-testflight:
    name: iOS TestFlight (Auto Signing Fixed)
    max_build_duration: 60

    environment:
      flutter: stable

      # ✅ THIS is the only correct signing mode for you
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanishkaa.attendanceapp

      vars:
        APP_STORE_APPLE_ID: 6776598247
        BUNDLE_ID: com.kanishkaa.attendanceapp

    integrations:
      app_store_connect: "Kanishkaa attendance app"

    scripts:
      # Clean environment (prevents broken signing cache)
      - name: Clean project
        script: flutter clean

      # Get dependencies
      - name: Install dependencies
        script: flutter pub get

      # Build IPA for App Store / TestFlight (NO plist, NO manual signing)
      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - appletabperumal@icloud.com