workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    max_build_duration: 60

    environment:
      flutter: stable

      ios_signing:
        certificates:
          - Kanishkaa Attendance Distribution
        provisioning_profiles:
          - Kanishkaa Mobile Distribution

    integrations:
      app_store_connect: Kanishkaa attendance app

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Increment build number
        script: |
          agvtool new-version -all 1.0.$BUILD_NUMBER

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        release_type: IMMEDIATE

      email:
        recipients:
          - appletabperumal@icloud.com