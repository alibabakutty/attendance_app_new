workflows:
  ios-testflight:
    name: iOS TestFlight (Fixed Signing)
    max_build_duration: 60

    environment:
      flutter: stable

      # ✅ THIS is the important part (automatic App Store signing)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanishkaa.attendanceapp

      vars:
        APP_STORE_APPLE_ID: 6776598247
        BUNDLE_ID: com.kanishkaa.attendanceapp

    integrations:
      app_store_connect: "Kanishkaa attendance app"

    scripts:
      # 1. Get dependencies
      - name: Install dependencies
        script: flutter pub get

      # 2. Clean build (prevents old signing cache issues)
      - name: Clean iOS build
        script: flutter clean

      # 3. Build IPA (NO export plist, NO manual signing)
      - name: Build IPA for TestFlight
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Testers

      email:
        recipients:
          - appletabperumal@icloud.com