workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    max_build_duration: 60

    environment:
      ios_signing:
        distribution_type: app_store
        provisioning_profiles:
          - Kanishkaa Mobile Distribution
        certificates:
          - Kanishkaa Attendance Distribution

    integrations:
      app_store_connect: 'Kanishkaa attendance app'

    scripts:
      - name: Clean iOS
        script: rm -rf ios/Pods ios/Podfile.lock

      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install && cd ..

      - name: Build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_app_store: true
        release_type: MANUAL

      email:
        recipients:
          - appletabperumal@icloud.com