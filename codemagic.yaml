workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable
      xcode: latest

      groups:
        - kanishka_env

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kanishkaa.attendanceapp

    integrations:
      app_store_connect: Kanishkaa attendance app

    scripts:
      - name: Clean project
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL=$API_BASE_URL

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - tallysriram007@gmail.com