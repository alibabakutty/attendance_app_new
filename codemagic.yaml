workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    environment:
      ios_signing:
        provisioning_profiles:
          - kanishkaa_appstore_profile
        certificates:
          - Distribute_Certificate
    scripts:
      - script: xcode-project use-profiles
      - script: flutter packages pub get
      - name: Flutter build ipa and automatic versioning
        script: |
          flutter build ipa --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    
    # ⬇️ UPDATED PUBLISHING SECTION ⬇️
    publishing:
      app_store_connect:
        auth: 'Kanishkaa attendance app'
        # Set to true to submit the build to TestFlight automatically
        submit_to_testflight: true
      email:
        recipients:
          - tallysriram007@gmail.com