workflows:
  ios-method-2:
    name: iOS signing method-2 workflow
    max_build_duration: 60
    environment:
      ios_signing:
        provisioning_profiles:
          - Kanishkaa Mobile Distribution
        certificates:
          - Kanishkaa Attendance Distribution

    # ⬇️ LINK YOUR UI INTEGRATION AT THE WORKFLOW ROOT LEVEL ⬇️
    integrations:
      app_store_connect: 'Kanishkaa attendance app'

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration  # 💡 Tells Codemagic to look at the 'integrations' block above
        submit_to_app_store: true

        release_type: MANUAL
      email:
        recipients:
          - appletabperumal@icloud.com